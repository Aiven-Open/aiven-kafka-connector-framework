# Configure the root logger level (applies to all loggers unless overridden)
.level = INFO
io.aiven.commons.kafka.connector.level = FINEST

# Specify handlers: ConsoleHandler (logs to console) and FileHandler (logs to file)
handlers = java.util.logging.ConsoleHandler
#handlers = java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# ConsoleHandler configuration
java.util.logging.ConsoleHandler.level = DEBUG
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# FileHandler configuration
#java.util.logging.FileHandler.level = INFO
#java.util.logging.FileHandler.pattern = app.log  # Log file path (relative to JVM working dir)
#java.util.logging.FileHandler.limit = 50000     # Max log file size (50KB)
#java.util.logging.FileHandler.count = 5         # Keep up to 5 log files
#java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter
#java.util.logging.FileHandler.append = true      # Append to existing files